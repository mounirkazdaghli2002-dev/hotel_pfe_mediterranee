[server]
port = 8501
headless = true
enableCORS = false
enableXsrfProtection = false
enableStaticServing = false
address = "0.0.0.0"

[browser]
serverAddress = "local_ip"  # Use 0.0.0.0 equivalent for browser
gatherUsageStats = false

[theme]
primaryColor = "#CC6D3D"
backgroundColor = "#0f172a"
secondaryBackgroundColor = "#1e293b"
textColor = "#ffffff"
font = "sans serif"

[runner]
magicEnabled = true
fastReruns = true

