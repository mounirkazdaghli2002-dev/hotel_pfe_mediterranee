version: '3.8'

services:
  hotel-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotel-mediterranee
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_RESPONSE_MAX_SIZE=200
    volumes:
      - ./data:/app/data
      - ./hotel_mediterranee.db:/app/hotel_mediterranee.db
      - ./.streamlit:/app/.streamlit
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Optional: Redis pour le cache/session si besoin
  # redis:
  #   image: redis:7-alpine
  #   container_name: hotel-redis
  #   ports:
  #     - "6379:6379"
  #   volumes:
  #     - redis_data:/data
  #   restart: unless-stopped

volumes:
  # redis_data:
  #   driver: local
  pass: null

networks:
  default:
    name: hotel-network
