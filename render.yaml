services:
  - type: web
    name: hotel-mediterranee
    env: python
    buildCommand: pip install -r requirements-render.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATA_DIR
        sync: false
      - key: SECRET_KEY
        sync: false
